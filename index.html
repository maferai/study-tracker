<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --surface2: #efede8;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text: #1a1916;
      --text-muted: #7a7770;
      --text-faint: #b0ada8;
      --accent: #2a5cff;
      --accent-bg: #eef1ff;
      --danger: #d93025;
      --danger-bg: #fff0ef;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1d1b;
        --surface2: #272522;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);
        --text: #f0ede8;
        --text-muted: #8a8780;
        --text-faint: #55524e;
        --accent: #5b7fff;
        --accent-bg: #1a2040;
        --danger: #f26b63;
        --danger-bg: #2e1515;
      }
    }

    html { font-size: 16px; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
    .page { max-width: 680px; margin: 0 auto; }

    /* Header */
    .site-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .site-header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
    .site-header h1 span { display: block; font-size: 13px; font-weight: 400; color: var(--text-muted); letter-spacing: 0; margin-bottom: 4px; }
    .header-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-muted); text-align: right; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
    .stat-card .label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); font-family: 'DM Mono', monospace; }
    .stat-card .sub { font-size: 12px; color: var(--text-faint); margin-top: 2px; }

    /* Form */
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
    .form-card h2 { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
    .form-group input, .form-group select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.15s; width: 100%;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-faint); }
    .time-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; align-items: center; }
    .time-row .sep { font-size: 13px; color: var(--text-faint); text-align: center; }
    .error-msg { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
    .add-btn {
      margin-top: 12px; width: 100%; padding: 11px; background: var(--accent); border: none;
      border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px;
      font-weight: 500; color: #fff; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .add-btn:hover { opacity: 0.88; }
    .add-btn:active { transform: scale(0.99); }

    /* Calendar */
    .calendar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .cal-header h2 { font-size: 14px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .cal-nav { display: flex; align-items: center; gap: 8px; }
    .cal-nav button {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 4px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: var(--text-muted); cursor: pointer; transition: background 0.12s; line-height: 1.4;
    }
    .cal-nav button:hover { background: var(--surface2); }
    .cal-month-label { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); min-width: 115px; text-align: center; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
    .cal-weekday { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); text-align: center; padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day {
      aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-size: 13px; cursor: pointer;
      transition: background 0.12s; position: relative; border: 1px solid transparent; gap: 3px;
      user-select: none;
    }
    .cal-day:hover { background: var(--surface2); }
    .cal-day.empty { cursor: default; pointer-events: none; }
    .cal-day.today { border-color: var(--accent); }
    .cal-day.today .cal-day-num { color: var(--accent); font-weight: 600; }
    .cal-day.has-study { background: var(--accent-bg); }
    .cal-day.has-study:hover { filter: brightness(0.96); }
    .cal-day.selected { background: var(--accent) !important; border-color: var(--accent); }
    .cal-day.selected .cal-day-num { color: #fff !important; font-weight: 600; }
    .cal-day.selected .cal-dot { background: rgba(255,255,255,0.65) !important; }
    .cal-day-num { font-size: 13px; color: var(--text); line-height: 1; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* Day detail */
    .day-detail { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); animation: fadeUp 0.15s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .day-detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .day-detail-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .day-detail-total { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-muted); background: var(--surface2); padding: 3px 8px; border-radius: 20px; }
    .day-detail-close { background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 15px; padding: 3px 7px; border-radius: 5px; }
    .day-detail-close:hover { background: var(--surface2); color: var(--text); }
    .day-sessions { display: flex; flex-direction: column; gap: 6px; }
    .day-session-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 12px; }
    .day-session-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .day-session-name { flex: 1; font-size: 13px; color: var(--text); }
    .day-session-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-muted); }
    .day-empty { font-size: 13px; color: var(--text-faint); text-align: center; padding: 10px 0; }

    /* Chart */
    .chart-section { margin-bottom: 1.5rem; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .chart-card h2 { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 1.1rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .bars { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: grid; grid-template-columns: 110px 1fr 60px; align-items: center; gap: 10px; }
    .bar-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { background: var(--surface2); border-radius: 99px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .bar-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); text-align: right; }

    /* Toolbar + List */
    .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .toolbar-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); flex: 1; }
    .toolbar select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); cursor: pointer; outline: none; }
    .toolbar select:focus { border-color: var(--accent); }
    .entry-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.18s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
    .entry-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .entry-info { flex: 1; min-width: 0; }
    .entry-subject { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-date { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .entry-duration { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; }
    .delete-btn { background: none; border: none; cursor: pointer; color: var(--text-faint); padding: 5px; border-radius: 6px; font-size: 14px; line-height: 1; transition: color 0.12s, background 0.12s; }
    .delete-btn:hover { color: var(--danger); background: var(--danger-bg); }
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-faint); font-size: 14px; border: 1px dashed var(--border-strong); border-radius: var(--radius); }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 80px 1fr 48px; }
      .cal-day-num { font-size: 12px; }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <h1><span>Your dashboard</span>Study tracker</h1>
    <div class="header-time" id="clockDisplay"></div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Total time</div>
      <div class="value" id="statTime">0h 0m</div>
      <div class="sub">all sessions</div>
    </div>
    <div class="stat-card">
      <div class="label">Sessions</div>
      <div class="value" id="statSessions">0</div>
      <div class="sub">logged</div>
    </div>
    <div class="stat-card">
      <div class="label">Subjects</div>
      <div class="value" id="statSubjects">0</div>
      <div class="sub">unique</div>
    </div>
  </div>

  <div class="form-card">
    <h2>Log a session</h2>
    <div class="form-row single">
      <div class="form-group">
        <label for="subjectInput">Subject</label>
        <input type="text" id="subjectInput" placeholder="e.g. Mathematics, History..." autocomplete="off" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Time studied</label>
        <div class="time-row">
          <input type="number" id="hoursInput" placeholder="0" min="0" max="23" />
          <div class="sep">hr &nbsp; min</div>
          <input type="number" id="minutesInput" placeholder="0" min="0" max="59" />
        </div>
      </div>
      <div class="form-group">
        <label for="dateInput">Date (optional)</label>
        <input type="date" id="dateInput" />
      </div>
    </div>
    <p class="error-msg" id="errorMsg">Please enter a subject and at least 1 minute of study time.</p>
    <button class="add-btn" id="addBtn">+ Add session</button>
  </div>

  <!-- 2026 Calendar -->
  <div class="calendar-card">
    <div class="cal-header">
      <h2>2026 calendar</h2>
      <div class="cal-nav">
        <button id="calPrev">&#8592;</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button id="calNext">&#8594;</button>
      </div>
    </div>
    <div class="cal-weekdays">
      <div class="cal-weekday">Su</div>
      <div class="cal-weekday">Mo</div>
      <div class="cal-weekday">Tu</div>
      <div class="cal-weekday">We</div>
      <div class="cal-weekday">Th</div>
      <div class="cal-weekday">Fr</div>
      <div class="cal-weekday">Sa</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="dayDetail"></div>
  </div>

  <div class="chart-section" id="chartSection" style="display:none;">
    <div class="chart-card">
      <h2>Time by subject</h2>
      <div class="bars" id="barsContainer"></div>
    </div>
  </div>

  <div class="toolbar">
    <span class="toolbar-label">Sessions</span>
    <select id="filterSelect" onchange="renderEntries()">
      <option value="all">All subjects</option>
    </select>
    <select id="sortSelect" onchange="renderEntries()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="longest">Longest first</option>
    </select>
  </div>
  <div class="entry-list" id="entryList">
    <div class="empty-state"><div class="icon">📚</div>No sessions yet — log your first one above!</div>
  </div>

</div>
<script>
  const COLORS = [
    {bg:'#dde6ff',text:'#1a3ab5'},{bg:'#d9f5ea',text:'#0e5c3a'},{bg:'#fde8d8',text:'#8f3a10'},
    {bg:'#fde4ef',text:'#8a1c48'},{bg:'#e2f8f0',text:'#0a5240'},{bg:'#fff3d4',text:'#7a4d00'},
    {bg:'#ece0ff',text:'#4a1faa'},{bg:'#ffeaea',text:'#8c1c1c'},
  ];
  const COLORS_DARK = [
    {bg:'#1a2550',text:'#8aaeff'},{bg:'#0e2e1e',text:'#5fd9a0'},{bg:'#2e1508',text:'#f5a070'},
    {bg:'#2e0e1a',text:'#f5809e'},{bg:'#082e20',text:'#50d8aa'},{bg:'#2e1e00',text:'#ffc94a'},
    {bg:'#1e0e3e',text:'#b88eff'},{bg:'#2e0808',text:'#ff9090'},
  ];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function isDark() { return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }

  let entries = [], subjectColorMap = {}, colorIndex = 0;
  let calMonth = 0, selectedDate = null;

  function getColor(subject) {
    const key = subject.trim().toLowerCase();
    if (subjectColorMap[key] === undefined) { subjectColorMap[key] = colorIndex % COLORS.length; colorIndex++; }
    return isDark() ? COLORS_DARK[subjectColorMap[key]] : COLORS[subjectColorMap[key]];
  }
  function getInitials(name) { return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
  function formatTime(mins) {
    const h = Math.floor(mins/60), m = mins%60;
    if (h===0) return `${m}m`; if (m===0) return `${h}h`; return `${h}h ${m}m`;
  }
  function formatDate(ds) {
    if (!ds) return null;
    const [y,mo,d] = ds.split('-');
    return new Date(+y,+mo-1,+d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function todayValue() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function save() {
    try { localStorage.setItem('studyEntries', JSON.stringify(entries)); } catch(e){}
    try { localStorage.setItem('studyColorMap', JSON.stringify(subjectColorMap)); } catch(e){}
    try { localStorage.setItem('studyColorIndex', colorIndex); } catch(e){}
  }
  function load() {
    try { const e=localStorage.getItem('studyEntries'); if(e) entries=JSON.parse(e); } catch(e){}
    try { const c=localStorage.getItem('studyColorMap'); if(c) subjectColorMap=JSON.parse(c); } catch(e){}
    try { const i=localStorage.getItem('studyColorIndex'); if(i) colorIndex=parseInt(i); } catch(e){}
  }

  function addEntry() {
    const subject = document.getElementById('subjectInput').value.trim();
    const hours = parseInt(document.getElementById('hoursInput').value)||0;
    const minutes = parseInt(document.getElementById('minutesInput').value)||0;
    const date = document.getElementById('dateInput').value;
    const err = document.getElementById('errorMsg');
    if (!subject || (hours===0 && minutes===0)) { err.style.display='block'; return; }
    err.style.display='none';
    entries.push({id:Date.now(), subject, totalMins:hours*60+minutes, date:date||null, addedAt:Date.now()});
    document.getElementById('subjectInput').value='';
    document.getElementById('hoursInput').value='';
    document.getElementById('minutesInput').value='';
    document.getElementById('dateInput').value=todayValue();
    save(); refresh();
  }
  function deleteEntry(id) { entries=entries.filter(e=>e.id!==id); save(); refresh(); }

  function updateStats() {
    const total = entries.reduce((s,e)=>s+e.totalMins,0);
    document.getElementById('statTime').textContent=`${Math.floor(total/60)}h ${total%60}m`;
    document.getElementById('statSessions').textContent=entries.length;
    document.getElementById('statSubjects').textContent=new Set(entries.map(e=>e.subject.trim().toLowerCase())).size;
  }

  function updateChart() {
    const section=document.getElementById('chartSection'), container=document.getElementById('barsContainer');
    if (entries.length===0) { section.style.display='none'; return; }
    const totals={};
    entries.forEach(e=>{ const k=e.subject.trim(); totals[k]=(totals[k]||0)+e.totalMins; });
    const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
    const max=sorted[0][1];
    section.style.display='block';
    container.innerHTML=sorted.map(([name,mins])=>{
      const c=getColor(name);
      return `<div class="bar-row">
        <div class="bar-name" title="${name}">${name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(mins/max*100)}%;background:${c.text};"></div></div>
        <div class="bar-val">${formatTime(mins)}</div>
      </div>`;
    }).join('');
  }

  function updateFilter() {
    const sel=document.getElementById('filterSelect'), cur=sel.value;
    const subjects=[...new Set(entries.map(e=>e.subject.trim()))];
    sel.innerHTML='<option value="all">All subjects</option>';
    subjects.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; if(s===cur) o.selected=true; sel.appendChild(o); });
  }

  function renderEntries() {
    const list=document.getElementById('entryList');
    const filter=document.getElementById('filterSelect').value;
    const sort=document.getElementById('sortSelect').value;
    let shown=filter==='all'?[...entries]:entries.filter(e=>e.subject.trim()===filter);
    if (sort==='newest') shown.sort((a,b)=>b.addedAt-a.addedAt);
    else if (sort==='oldest') shown.sort((a,b)=>a.addedAt-b.addedAt);
    else if (sort==='longest') shown.sort((a,b)=>b.totalMins-a.totalMins);
    if (shown.length===0) { list.innerHTML=`<div class="empty-state"><div class="icon">📚</div>No sessions yet — log your first one above!</div>`; return; }
    list.innerHTML=shown.map(e=>{
      const c=getColor(e.subject);
      return `<div class="entry-item">
        <div class="entry-avatar" style="background:${c.bg};color:${c.text};">${getInitials(e.subject)}</div>
        <div class="entry-info">
          <div class="entry-subject">${e.subject}</div>
          ${e.date?`<div class="entry-date">${formatDate(e.date)}</div>`:''}
        </div>
        <div class="entry-duration">${formatTime(e.totalMins)}</div>
        <button class="delete-btn" onclick="deleteEntry(${e.id})" title="Delete">✕</button>
      </div>`;
    }).join('');
  }

  /* ── Calendar ── */
  function getStudyByDate() {
    const map={};
    entries.forEach(e=>{ if(e.date){ if(!map[e.date]) map[e.date]=[]; map[e.date].push(e); } });
    return map;
  }

  function renderCalendar() {
    const grid=document.getElementById('calGrid');
    document.getElementById('calMonthLabel').textContent=MONTHS[calMonth];
    const studyMap=getStudyByDate();
    const today=todayValue();
    const firstDay=new Date(2026,calMonth,1).getDay();
    const daysInMonth=new Date(2026,calMonth+1,0).getDate();

    let html='';
    for (let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;
    for (let d=1;d<=daysInMonth;d++) {
      const ds=`2026-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasStudy=!!studyMap[ds];
      const isToday=ds===today;
      const isSel=ds===selectedDate;
      let cls='cal-day';
      if (hasStudy) cls+=' has-study';
      if (isToday) cls+=' today';
      if (isSel) cls+=' selected';
      html+=`<div class="${cls}" onclick="selectDay('${ds}')">
        <span class="cal-day-num">${d}</span>
        ${hasStudy?`<span class="cal-dot"></span>`:''}
      </div>`;
    }
    grid.innerHTML=html;
    renderDayDetail();
  }

  function selectDay(ds) {
    selectedDate = selectedDate===ds ? null : ds;
    renderCalendar();
  }

  function renderDayDetail() {
    const panel=document.getElementById('dayDetail');
    if (!selectedDate) { panel.innerHTML=''; return; }
    const studyMap=getStudyByDate();
    const daySessions=studyMap[selectedDate]||[];
    const totalMins=daySessions.reduce((s,e)=>s+e.totalMins,0);
    const [y,mo,d]=selectedDate.split('-');
    const label=new Date(+y,+mo-1,+d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

    const sessionsHtml = daySessions.length===0
      ? `<div class="day-empty">No study sessions recorded for this day.</div>`
      : `<div class="day-sessions">${daySessions.map(e=>{
          const c=getColor(e.subject);
          return `<div class="day-session-item">
            <div class="day-session-avatar" style="background:${c.bg};color:${c.text};">${getInitials(e.subject)}</div>
            <div class="day-session-name">${e.subject}</div>
            <div class="day-session-time">${formatTime(e.totalMins)}</div>
          </div>`;
        }).join('')}</div>`;

    panel.innerHTML=`<div class="day-detail">
      <div class="day-detail-header">
        <div class="day-detail-title">${label}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${totalMins>0?`<span class="day-detail-total">${formatTime(totalMins)} total</span>`:''}
          <button class="day-detail-close" onclick="selectDay('${selectedDate}')">✕</button>
        </div>
      </div>
      ${sessionsHtml}
    </div>`;
  }

  document.getElementById('calPrev').addEventListener('click',()=>{ calMonth=Math.max(0,calMonth-1); selectedDate=null; renderCalendar(); });
  document.getElementById('calNext').addEventListener('click',()=>{ calMonth=Math.min(11,calMonth+1); selectedDate=null; renderCalendar(); });

  function updateClock() {
    const n=new Date();
    document.getElementById('clockDisplay').innerHTML=
      `${n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}<br>${n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
  }

  function refresh() { updateStats(); updateChart(); updateFilter(); renderEntries(); renderCalendar(); }

  // Init
  load();
  // Set calendar to current month if in 2026, else January
  calMonth = (new Date().getFullYear()===2026) ? new Date().getMonth() : 0;
  document.getElementById('dateInput').value=todayValue();
  document.getElementById('addBtn').addEventListener('click',addEntry);
  ['subjectInput','hoursInput','minutesInput'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown',e=>{ if(e.key==='Enter') addEntry(); });
  });
  updateClock();
  setInterval(updateClock,30000);
  refresh();
</script>
</body>
</html>
