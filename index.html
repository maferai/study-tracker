<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --surface2: #efede8;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text: #1a1916;
      --text-muted: #7a7770;
      --text-faint: #b0ada8;
      --accent: #2a5cff;
      --accent-bg: #eef1ff;
      --danger: #d93025;
      --danger-bg: #fff0ef;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1d1b;
        --surface2: #272522;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);
        --text: #f0ede8;
        --text-muted: #8a8780;
        --text-faint: #55524e;
        --accent: #5b7fff;
        --accent-bg: #1a2040;
        --danger: #f26b63;
        --danger-bg: #2e1515;
      }
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .site-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .site-header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .site-header h1 span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0;
      margin-bottom: 4px;
    }

    .header-time {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
    }

    .stat-card .label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    .stat-card .sub {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 2px;
    }

    /* ── Form ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-card h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-row.single { grid-template-columns: 1fr; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .form-group input::placeholder {
      color: var(--text-faint);
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 6px;
      align-items: center;
    }

    .time-row .sep {
      font-size: 13px;
      color: var(--text-faint);
      text-align: center;
    }

    .time-label {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .time-label span {
      font-size: 11px;
      color: var(--text-faint);
    }

    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: 6px;
      display: none;
    }

    .add-btn {
      margin-top: 12px;
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .add-btn:hover { opacity: 0.88; }
    .add-btn:active { transform: scale(0.99); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      flex: 1;
    }

    .toolbar select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    .toolbar select:focus {
      border-color: var(--accent);
    }

    /* ── Entry list ── */
    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entry-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: none; }
    }

    .entry-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .entry-info { flex: 1; min-width: 0; }

    .entry-subject {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .entry-duration {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      padding: 5px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1;
      transition: color 0.12s, background 0.12s;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: var(--danger-bg);
    }

    /* ── Bar chart ── */
    .chart-section {
      margin-bottom: 1.5rem;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .chart-card h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .bars {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 60px;
      align-items: center;
      gap: 10px;
    }

    .bar-name {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      background: var(--surface2);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .bar-val {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-faint);
      font-size: 14px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
    }

    .empty-state .icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .stat-card .value { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header class="site-header">
      <h1>
        <span>Your dashboard</span>
        Study tracker
      </h1>
      <div class="header-time" id="clockDisplay"></div>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Total time</div>
        <div class="value" id="statTime">0h 0m</div>
        <div class="sub">all sessions</div>
      </div>
      <div class="stat-card">
        <div class="label">Sessions</div>
        <div class="value" id="statSessions">0</div>
        <div class="sub">logged</div>
      </div>
      <div class="stat-card">
        <div class="label">Subjects</div>
        <div class="value" id="statSubjects">0</div>
        <div class="sub">unique</div>
      </div>
    </div>

    <!-- Add Session Form -->
    <div class="form-card">
      <h2>Log a session</h2>
      <div class="form-row single">
        <div class="form-group">
          <label for="subjectInput">Subject</label>
          <input type="text" id="subjectInput" placeholder="e.g. Mathematics, History..." autocomplete="off" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Time studied</label>
          <div class="time-row">
            <div>
              <input type="number" id="hoursInput" placeholder="0" min="0" max="23" />
            </div>
            <div class="sep">hr &nbsp; min</div>
            <div>
              <input type="number" id="minutesInput" placeholder="0" min="0" max="59" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="dateInput">Date (optional)</label>
          <input type="date" id="dateInput" />
        </div>
      </div>
      <p class="error-msg" id="errorMsg">Please enter a subject and at least 1 minute of study time.</p>
      <button class="add-btn" id="addBtn">+ Add session</button>
    </div>

    <!-- Chart -->
    <div class="chart-section" id="chartSection" style="display:none;">
      <div class="chart-card">
        <h2>Time by subject</h2>
        <div class="bars" id="barsContainer"></div>
      </div>
    </div>

    <!-- Session List -->
    <div class="toolbar">
      <span class="toolbar-label">Sessions</span>
      <select id="filterSelect" onchange="renderEntries()">
        <option value="all">All subjects</option>
      </select>
      <select id="sortSelect" onchange="renderEntries()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="longest">Longest first</option>
      </select>
    </div>
    <div class="entry-list" id="entryList">
      <div class="empty-state">
        <div class="icon">📚</div>
        No sessions yet — log your first one above!
      </div>
    </div>

  </div>

  <script>
    // ── Color palette per subject ──
    const COLORS = [
      { bg: '#dde6ff', text: '#1a3ab5' },
      { bg: '#d9f5ea', text: '#0e5c3a' },
      { bg: '#fde8d8', text: '#8f3a10' },
      { bg: '#fde4ef', text: '#8a1c48' },
      { bg: '#e2f8f0', text: '#0a5240' },
      { bg: '#fff3d4', text: '#7a4d00' },
      { bg: '#ece0ff', text: '#4a1faa' },
      { bg: '#ffeaea', text: '#8c1c1c' },
    ];

    // ── Dark mode overrides ──
    const COLORS_DARK = [
      { bg: '#1a2550', text: '#8aaeff' },
      { bg: '#0e2e1e', text: '#5fd9a0' },
      { bg: '#2e1508', text: '#f5a070' },
      { bg: '#2e0e1a', text: '#f5809e' },
      { bg: '#082e20', text: '#50d8aa' },
      { bg: '#2e1e00', text: '#ffc94a' },
      { bg: '#1e0e3e', text: '#b88eff' },
      { bg: '#2e0808', text: '#ff9090' },
    ];

    function isDark() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    let entries = [];
    let subjectColorMap = {};
    let colorIndex = 0;

    function getColor(subject) {
      const key = subject.trim().toLowerCase();
      if (subjectColorMap[key] === undefined) {
        subjectColorMap[key] = colorIndex % COLORS.length;
        colorIndex++;
      }
      const idx = subjectColorMap[key];
      return isDark() ? COLORS_DARK[idx] : COLORS[idx];
    }

    function getInitials(name) {
      return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function formatTime(mins) {
      const h = Math.floor(mins / 60), m = mins % 60;
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h ${m}m`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return null;
      const [y, mo, d] = dateStr.split('-');
      return new Date(+y, +mo - 1, +d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Load/Save ──
    function save() {
      try { localStorage.setItem('studyEntries', JSON.stringify(entries)); } catch(e) {}
      try { localStorage.setItem('studyColorMap', JSON.stringify(subjectColorMap)); } catch(e) {}
      try { localStorage.setItem('studyColorIndex', colorIndex); } catch(e) {}
    }

    function load() {
      try {
        const e = localStorage.getItem('studyEntries');
        if (e) entries = JSON.parse(e);
        const c = localStorage.getItem('studyColorMap');
        if (c) subjectColorMap = JSON.parse(c);
        const i = localStorage.getItem('studyColorIndex');
        if (i) colorIndex = parseInt(i);
      } catch(e) {}
    }

    // ── Add entry ──
    function addEntry() {
      const subject = document.getElementById('subjectInput').value.trim();
      const hours = parseInt(document.getElementById('hoursInput').value) || 0;
      const minutes = parseInt(document.getElementById('minutesInput').value) || 0;
      const date = document.getElementById('dateInput').value;
      const err = document.getElementById('errorMsg');

      if (!subject || (hours === 0 && minutes === 0)) {
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';

      entries.push({
        id: Date.now(),
        subject,
        totalMins: hours * 60 + minutes,
        date: date || null,
        addedAt: Date.now()
      });

      document.getElementById('subjectInput').value = '';
      document.getElementById('hoursInput').value = '';
      document.getElementById('minutesInput').value = '';
      document.getElementById('dateInput').value = todayValue();

      save();
      refresh();
    }

    function deleteEntry(id) {
      entries = entries.filter(e => e.id !== id);
      save();
      refresh();
    }

    // ── Stats ──
    function updateStats() {
      const total = entries.reduce((s, e) => s + e.totalMins, 0);
      const h = Math.floor(total / 60), m = total % 60;
      document.getElementById('statTime').textContent = `${h}h ${m}m`;
      document.getElementById('statSessions').textContent = entries.length;
      const subjects = new Set(entries.map(e => e.subject.trim().toLowerCase()));
      document.getElementById('statSubjects').textContent = subjects.size;
    }

    // ── Chart ──
    function updateChart() {
      const section = document.getElementById('chartSection');
      const container = document.getElementById('barsContainer');
      if (entries.length === 0) { section.style.display = 'none'; return; }

      const totals = {};
      entries.forEach(e => {
        const key = e.subject.trim();
        totals[key] = (totals[key] || 0) + e.totalMins;
      });

      const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
      const max = sorted[0][1];

      section.style.display = 'block';
      container.innerHTML = sorted.map(([name, mins]) => {
        const c = getColor(name);
        const pct = Math.round((mins / max) * 100);
        return `
          <div class="bar-row">
            <div class="bar-name" title="${name}">${name}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;background:${c.text};"></div>
            </div>
            <div class="bar-val">${formatTime(mins)}</div>
          </div>`;
      }).join('');
    }

    // ── Filter dropdown ──
    function updateFilter() {
      const sel = document.getElementById('filterSelect');
      const cur = sel.value;
      const subjects = [...new Set(entries.map(e => e.subject.trim()))];
      sel.innerHTML = '<option value="all">All subjects</option>';
      subjects.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        if (s === cur) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    // ── Entry list ──
    function renderEntries() {
      const list = document.getElementById('entryList');
      const filter = document.getElementById('filterSelect').value;
      const sort = document.getElementById('sortSelect').value;

      let shown = filter === 'all' ? [...entries] : entries.filter(e => e.subject.trim() === filter);

      if (sort === 'newest')  shown.sort((a, b) => b.addedAt - a.addedAt);
      else if (sort === 'oldest')  shown.sort((a, b) => a.addedAt - b.addedAt);
      else if (sort === 'longest') shown.sort((a, b) => b.totalMins - a.totalMins);

      if (shown.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="icon">📚</div>No sessions yet — log your first one above!</div>`;
        return;
      }

      list.innerHTML = shown.map(e => {
        const c = getColor(e.subject);
        const initials = getInitials(e.subject);
        const dateLabel = e.date ? formatDate(e.date) : '';
        return `
          <div class="entry-item">
            <div class="entry-avatar" style="background:${c.bg};color:${c.text};">${initials}</div>
            <div class="entry-info">
              <div class="entry-subject">${e.subject}</div>
              ${dateLabel ? `<div class="entry-date">${dateLabel}</div>` : ''}
            </div>
            <div class="entry-duration">${formatTime(e.totalMins)}</div>
            <button class="delete-btn" onclick="deleteEntry(${e.id})" title="Delete session">✕</button>
          </div>`;
      }).join('');
    }

    function refresh() {
      updateStats();
      updateChart();
      updateFilter();
      renderEntries();
    }

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const date = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clockDisplay').innerHTML = `${date}<br>${time}`;
    }

    function todayValue() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ── Init ──
    load();
    document.getElementById('dateInput').value = todayValue();
    document.getElementById('addBtn').addEventListener('click', addEntry);
    document.getElementById('subjectInput').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });
    document.getElementById('hoursInput').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });
    document.getElementById('minutesInput').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

    updateClock();
    setInterval(updateClock, 30000);
    refresh();
  </script>
</body>
</html>
